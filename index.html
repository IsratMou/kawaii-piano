<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Kawaii Piano ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #ffeef8 0%, #fff0f5 30%, #f0e6ff 70%, #e6f3ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka', 'Nunito', sans-serif;
            color: #6b4c7a;
            overflow: hidden;
            position: relative;
        }

        /* Floating background decorations */
        .bg-decoration {
            position: fixed;
            pointer-events: none;
            opacity: 0.15;
            animation: float 6s ease-in-out infinite;
            font-size: 2rem;
            z-index: 0;
        }

        .bg-decoration:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .bg-decoration:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; font-size: 1.5rem; }
        .bg-decoration:nth-child(3) { bottom: 20%; left: 8%; animation-delay: 2s; font-size: 2.5rem; }
        .bg-decoration:nth-child(4) { top: 60%; right: 10%; animation-delay: 3s; font-size: 1.8rem; }
        .bg-decoration:nth-child(5) { bottom: 10%; right: 25%; animation-delay: 4s; font-size: 2.2rem; }
        .bg-decoration:nth-child(6) { top: 40%; left: 5%; animation-delay: 1.5s; font-size: 1.6rem; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .title-wrapper {
            text-align: center;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            color: #ff8fab;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(255,143,171,0.2);
            letter-spacing: 2px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .subtitle {
            font-size: 1.1rem;
            color: #b8a0c8;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .controls-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 16px 28px;
            display: flex;
            gap: 24px;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(255, 143, 171, 0.15), 
                        inset 0 0 0 2px rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.75rem;
            color: #c9a9d8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .cute-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(255, 154, 158, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka', sans-serif;
        }

        .cute-btn:hover {
            transform: scale(1.15) rotate(-5deg);
            box-shadow: 0 6px 20px rgba(255, 154, 158, 0.4);
        }

        .cute-btn:active {
            transform: scale(0.95);
        }

        .octave-bubble {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(161, 140, 209, 0.3);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .waveform-select {
            background: linear-gradient(135deg, #fff 0%, #fff5f8 100%);
            border: 2px solid #ffd6e0;
            color: #b8a0c8;
            padding: 8px 14px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            outline: none;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(255, 214, 224, 0.3);
        }

        .waveform-select:hover {
            border-color: #ff9a9e;
            transform: translateY(-2px);
        }

        .waveform-select option {
            font-family: 'Nunito', sans-serif;
            color: #6b4c7a;
        }

        .volume-slider {
            width: 100px;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, #ffd6e0, #ff9a9e);
            border-radius: 10px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(255, 154, 158, 0.4);
            border: 2px solid white;
            transition: transform 0.2s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .piano-wrapper {
            background: linear-gradient(135deg, #fff 0%, #fff5f8 100%);
            border-radius: 28px;
            padding: 24px 28px 20px;
            box-shadow: 
                0 20px 60px rgba(255, 143, 171, 0.15),
                0 0 0 4px rgba(255, 255, 255, 0.6),
                inset 0 0 20px rgba(255, 214, 224, 0.2);
            position: relative;
            border: 3px solid rgba(255, 214, 224, 0.5);
        }

        .piano-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .piano-label {
            font-size: 0.85rem;
            color: #d4b5d4;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .piano-hearts {
            display: flex;
            gap: 4px;
        }

        .tiny-heart {
            font-size: 0.9rem;
            opacity: 0.6;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .tiny-heart:nth-child(2) { animation-delay: 0.3s; }
        .tiny-heart:nth-child(3) { animation-delay: 0.6s; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .piano-container {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .white-keys {
            display: flex;
            gap: 4px;
        }

        .black-keys {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            pointer-events: none;
        }

        .key {
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 12px;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        .white-key {
            width: 52px;
            height: 200px;
            background: linear-gradient(180deg, #fff 0%, #fff8fb 60%, #ffeef5 100%);
            border-radius: 0 0 14px 14px;
            border: 2px solid #ffe0ec;
            box-shadow: 
                0 6px 0 #ffd6e0,
                0 8px 16px rgba(255, 143, 171, 0.15);
            color: #d4a5c4;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .white-key:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 0 #ffd6e0,
                0 10px 20px rgba(255, 143, 171, 0.2);
        }

        .white-key.active {
            transform: translateY(6px);
            box-shadow: 
                0 0 0 #ffd6e0,
                0 2px 8px rgba(255, 143, 171, 0.2);
            background: linear-gradient(180deg, #fff0f5 0%, #ffe0ec 100%);
            border-color: #ff9a9e;
        }

        .black-key {
            width: 34px;
            height: 130px;
            background: linear-gradient(180deg, #a18cd1 0%, #8b7bb4 50%, #7a6aa3 100%);
            border-radius: 0 0 10px 10px;
            position: absolute;
            pointer-events: auto;
            box-shadow: 
                0 5px 0 #6b5b9a,
                0 6px 12px rgba(107, 91, 154, 0.3);
            color: rgba(255,255,255,0.7);
            font-size: 0.65rem;
            font-weight: 700;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .black-key:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 7px 0 #6b5b9a,
                0 8px 16px rgba(107, 91, 154, 0.3);
        }

        .black-key.active {
            transform: translateY(5px);
            box-shadow: 
                0 0 0 #6b5b9a,
                0 2px 8px rgba(107, 91, 154, 0.2);
            background: linear-gradient(180deg, #b8a0d8 0%, #9b8bc4 100%);
        }

        .key-label {
            margin-bottom: 6px;
            opacity: 0.5;
            font-size: 0.7rem;
        }

        .key-name {
            font-size: 0.8rem;
        }

        .instructions-card {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px 28px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(255, 143, 171, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.6);
            max-width: 600px;
        }

        .instructions-card p {
            color: #b8a0c8;
            font-size: 0.9rem;
            line-height: 1.8;
            margin: 4px 0;
        }

        .instructions-card kbd {
            background: linear-gradient(135deg, #fff 0%, #fff0f5 100%);
            padding: 3px 10px;
            border-radius: 10px;
            border: 2px solid #ffd6e0;
            font-family: 'Fredoka', sans-serif;
            color: #ff8fab;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 2px 6px rgba(255, 143, 171, 0.15);
            display: inline-block;
            min-width: 28px;
            text-align: center;
        }

        .instructions-title {
            font-size: 1rem;
            color: #ff8fab;
            font-weight: 600;
            margin-bottom: 8px;
        }

        /* Floating hearts animation */
        .floating-heart {
            position: fixed;
            pointer-events: none;
            font-size: 1.5rem;
            animation: floatUp 1.5s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { 
                transform: translateY(0) scale(0.5) rotate(0deg); 
                opacity: 1; 
            }
            100% { 
                transform: translateY(-80px) scale(1.2) rotate(20deg); 
                opacity: 0; 
            }
        }

        /* Sparkle effect on key press */
        .sparkle {
            position: absolute;
            pointer-events: none;
            font-size: 1rem;
            animation: sparkleAnim 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

        @media (max-width: 900px) {
            .white-key { width: 42px; height: 170px; }
            .black-key { width: 28px; height: 110px; }
            h1 { font-size: 2.2rem; }
            .controls-card { gap: 16px; padding: 12px 20px; }
        }

        @media (max-width: 700px) {
            .white-key { width: 34px; height: 140px; font-size: 0.6rem; }
            .black-key { width: 22px; height: 90px; font-size: 0.5rem; }
            .piano-wrapper { padding: 16px 18px; }
            .controls-card { flex-wrap: wrap; gap: 12px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <!-- Background decorations -->
    <div class="bg-decoration">🌸</div>
    <div class="bg-decoration">⭐</div>
    <div class="bg-decoration">🎀</div>
    <div class="bg-decoration">💫</div>
    <div class="bg-decoration">🌷</div>
    <div class="bg-decoration">✨</div>

    <div class="container">
        <div class="title-wrapper">
            <h1>🎹 Kawaii Piano 🎹</h1>
        </div>
        <p class="subtitle">Play with your keyboard ~ ♪</p>

        <div class="controls-card">
            <div class="control-group">
                <label>Octave</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button class="cute-btn" onclick="changeOctave(-1)">−</button>
                    <div class="octave-bubble" id="octaveDisplay">4</div>
                    <button class="cute-btn" onclick="changeOctave(1)">+</button>
                </div>
            </div>
            <div class="control-group">
                <label>Sound</label>
                <select class="waveform-select" id="waveform" onchange="setWaveform(this.value)">
                    <option value="triangle">🎹 Piano</option>
                    <option value="sine">🎵 Soft</option>
                    <option value="square">🎮 8-bit</option>
                    <option value="sawtooth">🎺 Bright</option>
                </select>
            </div>
            <div class="control-group">
                <label>Volume</label>
                <input type="range" class="volume-slider" id="volume" min="0" max="100" value="50" oninput="setVolume(this.value)">
            </div>
        </div>

        <div class="piano-wrapper">
            <div class="piano-top">
                <span class="piano-label">♪ KAWAII KEYS ♪</span>
                <div class="piano-hearts">
                    <span class="tiny-heart">💕</span>
                    <span class="tiny-heart">💖</span>
                    <span class="tiny-heart">💕</span>
                </div>
            </div>
            <div class="piano-container" id="pianoContainer">
                <div class="white-keys" id="whiteKeys"></div>
                <div class="black-keys" id="blackKeys"></div>
            </div>
        </div>

        <div class="instructions-card">
            <div class="instructions-title">🌟 How to Play 🌟</div>
            <p><strong>White keys:</strong> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> <kbd>F</kbd> <kbd>G</kbd> <kbd>H</kbd> <kbd>J</kbd> <kbd>K</kbd> <kbd>L</kbd> <kbd>;</kbd> <kbd>'</kbd></p>
            <p><strong>Black keys:</strong> <kbd>W</kbd> <kbd>E</kbd> <kbd>T</kbd> <kbd>Y</kbd> <kbd>U</kbd> <kbd>O</kbd> <kbd>P</kbd></p>
            <p>Use <kbd>Z</kbd> / <kbd>X</kbd> to shift octaves ✨</p>
        </div>
    </div>

    <script>
        // Audio context
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let masterGain = null;
        let currentWaveform = 'triangle';
        let currentVolume = 0.3;
        let currentOctave = 4;
        const activeOscillators = new Map();
        const activeGainNodes = new Map();

        const noteFrequencies = {
            'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13,
            'E': 329.63, 'F': 349.23, 'F#': 369.99, 'G': 392.00,
            'G#': 415.30, 'A': 440.00, 'A#': 466.16, 'B': 493.88
        };

        const keyMap = {
            'a': 'C', 'w': 'C#', 's': 'D', 'e': 'D#', 'd': 'E',
            'f': 'F', 't': 'F#', 'g': 'G', 'y': 'G#', 'h': 'A',
            'u': 'A#', 'j': 'B', 'k': 'C', 'o': 'C#', 'l': 'D',
            'p': 'D#', ';': 'E', "'": 'F'
        };

        const sparkles = ['✨', '⭐', '💫', '🌟', '💖', '💕'];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = currentVolume;
                masterGain.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function getFrequency(note, octave) {
            const baseFreq = noteFrequencies[note.replace(/2|3/, '')];
            const octaveDiff = octave - 4;
            return baseFreq * Math.pow(2, octaveDiff);
        }

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        }

        function createFloatingHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = ['💖', '💕', '💗', '💝', '💘'][Math.floor(Math.random() * 5)];
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }

        function playNote(note, octave) {
            initAudio();
            const freq = getFrequency(note, octave);
            const keyId = note + octave;

            if (activeOscillators.has(keyId)) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = currentWaveform;
            osc.frequency.value = freq;

            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(1, now + 0.02);
            gainNode.gain.exponentialRampToValueAtTime(0.7, now + 0.1);

            osc.connect(gainNode);
            gainNode.connect(masterGain);
            osc.start(now);

            activeOscillators.set(keyId, osc);
            activeGainNodes.set(keyId, gainNode);

            highlightKey(note, octave, true);
        }

        function stopNote(note, octave) {
            const keyId = note + octave;
            if (!activeOscillators.has(keyId)) return;

            const osc = activeOscillators.get(keyId);
            const gainNode = activeGainNodes.get(keyId);
            const now = audioCtx.currentTime;

            gainNode.gain.cancelScheduledValues(now);
            gainNode.gain.setValueAtTime(gainNode.gain.value, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

            osc.stop(now + 0.3);

            setTimeout(() => {
                osc.disconnect();
                gainNode.disconnect();
            }, 350);

            activeOscillators.delete(keyId);
            activeGainNodes.delete(keyId);

            highlightKey(note, octave, false);
        }

        function highlightKey(note, octave, isActive) {
            const keyElement = document.querySelector(`[data-note="${note}"][data-octave="${octave}"]`);
            if (keyElement) {
                if (isActive) {
                    keyElement.classList.add('active');
                    const rect = keyElement.getBoundingClientRect();
                    createSparkle(rect.left + rect.width/2 - 10, rect.top - 10);
                    if (Math.random() > 0.5) {
                        createFloatingHeart(rect.left + rect.width/2, rect.top - 20);
                    }
                } else {
                    keyElement.classList.remove('active');
                }
            }
        }

        function buildPiano() {
            const whiteKeysContainer = document.getElementById('whiteKeys');
            const blackKeysContainer = document.getElementById('blackKeys');
            whiteKeysContainer.innerHTML = '';
            blackKeysContainer.innerHTML = '';

            const whiteNotes = ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C', 'D', 'E', 'F'];
            const blackNotes = ['C#', 'D#', null, 'F#', 'G#', 'A#', null, 'C#', 'D#', null, 'D#'];
            const keyLabels = ['A','S','D','F','G','H','J','K','L',';','"'];
            const blackLabels = ['W','E',null,'T','Y','U',null,'O','P',null,null];

            const whiteKeyWidth = 52;
            const gap = 4;

            for (let i = 0; i < whiteNotes.length; i++) {
                const note = whiteNotes[i];
                const octave = i >= 7 ? currentOctave + 1 : currentOctave;
                const key = document.createElement('div');
                key.className = 'key white-key';
                key.dataset.note = note + (i >= 7 ? '2' : '');
                key.dataset.octave = octave;
                key.innerHTML = `<span class="key-label">${keyLabels[i]}</span><span class="key-name">${note}${octave}</span>`;

                const startNote = note + (i >= 7 ? '2' : '');

                key.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    playNote(startNote, octave);
                });
                key.addEventListener('mouseup', () => stopNote(startNote, octave));
                key.addEventListener('mouseleave', () => stopNote(startNote, octave));

                whiteKeysContainer.appendChild(key);
            }

            for (let i = 0; i < blackNotes.length; i++) {
                if (!blackNotes[i]) continue;

                const note = blackNotes[i];
                const octave = i >= 7 ? currentOctave + 1 : currentOctave;
                const key = document.createElement('div');
                key.className = 'key black-key';
                key.dataset.note = note + (i >= 7 ? '2' : '');
                key.dataset.octave = octave;
                key.innerHTML = `<span class="key-label">${blackLabels[i]}</span>`;

                const leftPos = (i + 1) * (whiteKeyWidth + gap) - 18;
                key.style.left = leftPos + 'px';

                const startNote = note + (i >= 7 ? '2' : '');

                key.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    playNote(startNote, octave);
                });
                key.addEventListener('mouseup', () => stopNote(startNote, octave));
                key.addEventListener('mouseleave', () => stopNote(startNote, octave));

                blackKeysContainer.appendChild(key);
            }
        }

        function changeOctave(delta) {
            currentOctave = Math.max(1, Math.min(7, currentOctave + delta));
            document.getElementById('octaveDisplay').textContent = currentOctave;
            buildPiano();
        }

        function setWaveform(wave) {
            currentWaveform = wave;
        }

        function setVolume(val) {
            currentVolume = val / 100;
            if (masterGain) {
                masterGain.gain.value = currentVolume;
            }
        }

        const pressedKeys = new Set();

        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const key = e.key.toLowerCase();

            if (key === 'z') {
                changeOctave(-1);
                return;
            }
            if (key === 'x') {
                changeOctave(1);
                return;
            }

            if (keyMap[key] && !pressedKeys.has(key)) {
                pressedKeys.add(key);
                const note = keyMap[key];
                let octave = currentOctave;
                if (['k', 'o', 'l', 'p', ';', "'"].includes(key)) {
                    octave += 1;
                }
                playNote(note, octave);
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keyMap[key]) {
                pressedKeys.delete(key);
                const note = keyMap[key];
                let octave = currentOctave;
                if (['k', 'o', 'l', 'p', ';', "'"].includes(key)) {
                    octave += 1;
                }
                stopNote(note, octave);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (keyMap[e.key.toLowerCase()] || e.key.toLowerCase() === 'z' || e.key.toLowerCase() === 'x') {
                e.preventDefault();
            }
        });

        buildPiano();
        window.addEventListener('resize', buildPiano);
    </script>
</body>
</html>
